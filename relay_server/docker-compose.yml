version: '3.8'
services:
  relay:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_TOKEN=changeme
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
