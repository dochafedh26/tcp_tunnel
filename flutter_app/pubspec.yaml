name: tcp_tunnel_app
description: TCP Tunnel — access your work network from anywhere over port 443
version: 1.0.60+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.1
  path_provider: ^2.1.3
  open_file: ^4.0.0
  flutter_foreground_task: ^9.2.2
  permission_handler: ^11.3.1
  window_manager: ^0.4.3
  tray_manager: ^0.3.2
  file_picker: ^8.1.7
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/app_icon.ico
    - assets/usbip-win2.exe
