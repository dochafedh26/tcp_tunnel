name: Compile & Create Release Assets

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  # ── DETECT CHANGED PATHS ───────────────────────────────────────────────────
  filter:
    name: Check Changed Paths
    runs-on: ubuntu-latest
    outputs:
      agent_changed: ${{ steps.detect.outputs.agent_changed }}
      flutter_changed: ${{ steps.detect.outputs.flutter_changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags --force

      - name: Detect Changes
        id: detect
        shell: bash
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Find the previous tag sorting by refname versioning
          PREV_TAG=$(git tag --sort=-v:refname | grep -A 1 -E "^${CURRENT_TAG}$" | tail -n 1)
          
          # Fallback if first tag
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            PREV_TAG="HEAD~1"
          fi
          
          echo "Comparing $PREV_TAG against HEAD"
          
          # Check diff names
          CHANGED_FILES=$(git diff --name-only $PREV_TAG HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          AGENT_CHANGED="false"
          FLUTTER_CHANGED="false"
          
          if echo "$CHANGED_FILES" | grep -q -E "^agent/|^.github/workflows/release.yml"; then
            AGENT_CHANGED="true"
          fi
          
          if echo "$CHANGED_FILES" | grep -q -E "^flutter_app/|^.github/workflows/release.yml"; then
            FLUTTER_CHANGED="true"
          fi
          
          echo "agent_changed=$AGENT_CHANGED" >> $GITHUB_OUTPUT
          echo "flutter_changed=$FLUTTER_CHANGED" >> $GITHUB_OUTPUT
          echo "Result: agent_changed=$AGENT_CHANGED, flutter_changed=$FLUTTER_CHANGED"

  # ── BUILD THE DART AGENT ───────────────────────────────────────────────────
  build-agent:
    name: Build Agent (${{ matrix.os }})
    needs: filter
    if: needs.filter.outputs.agent_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform-suffix: linux
          - os: windows-latest
            platform-suffix: windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Version from Tag
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Injecting version $VERSION into codebase"
          sed -i "s/^version: .*/version: $VERSION+1/g" flutter_app/pubspec.yaml || true
          sed -i "s/static const String currentVersion = '[^']*'/static const String currentVersion = '$VERSION'/g" flutter_app/lib/services/updater_service.dart || true
          sed -i "s/^version: .*/version: $VERSION/g" agent/pubspec.yaml || true
          sed -i "s/static const String currentVersion = '[^']*'/static const String currentVersion = '$VERSION'/g" agent/lib/updater.dart || true
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' relay_server/package.json || true

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get
        working-directory: ./agent

      - name: Compile Executable
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            dart compile exe bin/agent.dart -o "agent_windows_$VERSION.exe"
            cp "agent_windows_$VERSION.exe" agent-windows.exe
          else
            dart compile exe bin/agent.dart -o "agent_linux_$VERSION"
            cp "agent_linux_$VERSION" agent-linux
          fi
        working-directory: ./agent

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os == 'windows-latest' && 'agent-windows-binary' || 'agent-linux-binary' }}
          path: |
            ./agent/agent_windows_*.exe
            ./agent/agent_linux_*
            ./agent/agent-windows.exe
            ./agent/agent-linux

  # ── BUILD THE FLUTTER APP ──────────────────────────────────────────────────
  build-flutter:
    name: Build Flutter Client (${{ matrix.target }})
    needs: filter
    if: needs.filter.outputs.flutter_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [android, windows, linux]
        include:
          - target: android
            os: ubuntu-latest
            output-path: build/app/outputs/flutter-apk
          - target: windows
            os: windows-latest
            output-path: build/windows/x64/runner/Release
          - target: linux
            os: ubuntu-latest
            output-path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Version from Tag
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Injecting version $VERSION into codebase"
          sed -i "s/^version: .*/version: $VERSION+1/g" flutter_app/pubspec.yaml || true
          sed -i "s/static const String currentVersion = '[^']*'/static const String currentVersion = '$VERSION'/g" flutter_app/lib/services/updater_service.dart || true
          sed -i "s/^version: .*/version: $VERSION/g" agent/pubspec.yaml || true
          sed -i "s/static const String currentVersion = '[^']*'/static const String currentVersion = '$VERSION'/g" agent/lib/updater.dart || true
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/g' relay_server/package.json || true

      - name: Setup Java (for Android build)
        if: matrix.target == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Enable Windows Desktop Build
        if: matrix.target == 'windows'
        run: flutter config --enable-windows-desktop

      - name: Enable Linux Desktop Build
        if: matrix.target == 'linux'
        run: flutter config --enable-linux-desktop

      - name: Get Dependencies
        run: flutter pub get
        working-directory: ./flutter_app

      - name: Build Android APK
        if: matrix.target == 'android'
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/tcp_tunnel_client_android_$VERSION.apk"
        working-directory: ./flutter_app

      - name: Build Windows App
        if: matrix.target == 'windows'
        run: flutter build windows --release
        working-directory: ./flutter_app

      - name: Build Linux App
        if: matrix.target == 'linux'
        run: flutter build linux --release
        working-directory: ./flutter_app

      # Compress Windows build folder to .zip
      - name: Package Windows Build
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $TAG_NAME = "${{ github.ref_name }}"
          $VERSION = $TAG_NAME.SubString(1)
          Compress-Archive -Path ${{ matrix.output-path }}/* -DestinationPath "tcp_tunnel_client_windows_$VERSION.zip"
        working-directory: ./flutter_app

      # Compress Linux build folder to .tar.gz
      - name: Package Linux Build
        if: matrix.target == 'linux'
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          tar -czf "tcp_tunnel_client_linux_$VERSION.tar.gz" -C ${{ matrix.output-path }} .
        working-directory: ./flutter_app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-client-binary
          path: |
            ./flutter_app/build/app/outputs/flutter-apk/tcp_tunnel_client_android_*.apk
            ./flutter_app/tcp_tunnel_client_windows_*.zip
            ./flutter_app/tcp_tunnel_client_linux_*.tar.gz

  # ── CREATE GITHUB RELEASE & UPLOAD ASSETS ──────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [filter, build-agent, build-flutter]
    if: |
      always() &&
      (needs.build-agent.result == 'success' || needs.build-agent.result == 'skipped') &&
      (needs.build-flutter.result == 'success' || needs.build-flutter.result == 'skipped') &&
      (needs.filter.outputs.agent_changed == 'true' || needs.filter.outputs.flutter_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Prepare Release Files
        id: release_files
        shell: bash
        run: |
          # Use find to locate all compiled executables, zips, apks, and tars recursively in downloaded dirs
          FILES=$(find . -maxdepth 3 -type f \( -name "agent_*" -o -name "agent-*" -o -name "tcp_tunnel_client_*" \))
          echo "Found release files:"
          echo "$FILES"
          
          # Write to github output
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.release_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
